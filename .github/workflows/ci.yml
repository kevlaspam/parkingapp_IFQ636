name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: parkease-production-deployment
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Create Backend .env File
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
          echo "PORT=${{ secrets.PORT }}" >> backend/.env

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Mocha/Chai Tests
        run: |
          cd backend
          npm test

      - name: Install Frontend Dependencies & Build
        env:
          GENERATE_SOURCEMAP: false
          CI: false
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 20

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Setup SSH Key & Known Hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare EC2 Directory & Pull Code
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            if [ ! -d "$HOME/parkingapp_IFQ636" ]; then
              git clone https://github.com/kevlaspam/parkingapp_IFQ636.git "$HOME/parkingapp_IFQ636"
            fi
            cd "$HOME/parkingapp_IFQ636"
            git reset --hard
            git pull origin main
            cd backend && npm install
          EOF

      - name: Write Backend .env on EC2
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@${{ secrets.EC2_HOST }} bash << EOF
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > ~/parkingapp_IFQ636/backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> ~/parkingapp_IFQ636/backend/.env
            echo "PORT=${{ secrets.PORT }}" >> ~/parkingapp_IFQ636/backend/.env
          EOF

      - name: Copy Frontend Build to EC2
        run: |
          scp -i ~/.ssh/deploy_key.pem -r frontend/build ubuntu@${{ secrets.EC2_HOST }}:~/parkingapp_IFQ636/frontend/

      - name: Restart PM2 Services
        run: |
          ssh -i ~/.ssh/deploy_key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
            cd "$HOME/parkingapp_IFQ636"
            npx pm2 stop all || true
            npx pm2 start backend/server.js --name "parking-backend" || npx pm2 restart "parking-backend"
            npx pm2 start npx --name "parking-frontend" -- serve -s frontend/build -l 3000 || npx pm2 restart "parking-frontend"
            npx pm2 save
          EOF
