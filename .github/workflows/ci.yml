name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Print Environment Secrets
        run: |
          echo "MONGO_URI: ${{ secrets.MONGO_URI }}"
          echo "JWT_SECRET: ${{ secrets.JWT_SECRET }}"
          echo "PORT: ${{ secrets.PORT }}"

      - name: Create Backend .env File
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
          echo "PORT=${{ secrets.PORT }}" >> backend/.env

      - name: Stop running PM2 services
        run: |
          pm2 stop all || true

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Install Frontend Dependencies & Build
        env:
          GENERATE_SOURCEMAP: false
          NODE_OPTIONS: --max-old-space-size=512
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run Backend Mocha/Chai Tests
        run: |
          cd backend
          npm test

      - name: Start and Restart PM2 Services
        run: |
          pm2 start backend/server.js --name "parking-backend" || pm2 restart "parking-backend"
          pm2 save
