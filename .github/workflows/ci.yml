name: MERN CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Create Backend .env File
        run: |
          echo "MONGO_URI=${{ secrets.MONGO_URI }}" > backend/.env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
          echo "PORT=${{ secrets.PORT }}" >> backend/.env

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Mocha/Chai Tests
        run: |
          cd backend
          npm test

      - name: Install Frontend Dependencies & Build
        env:
          GENERATE_SOURCEMAP: false
          CI: false
        run: |
          cd frontend
          npm install
          npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build/

  deploy-to-ec2:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Build Artifact
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: frontend/build/

      - name: Copy Frontend Build to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "frontend/build"
          target: "~/parkingapp_IFQ636"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to the project directory
            cd ~/parkingapp_IFQ636
            
            # 2. Reset and pull latest code
            git reset --hard
            git pull origin main
            
            # 3. Create backend .env file
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > backend/.env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> backend/.env
            echo "PORT=${{ secrets.PORT }}" >> backend/.env
            
            # 4. Install backend dependencies
            cd backend
            npm install
            
            # 5. Stop and restart PM2 services
            npx pm2 stop all || true
            npx pm2 start server.js --name "parking-backend" || npx pm2 restart "parking-backend"
            npx pm2 start npx --name "parking-frontend" -- serve -s ../frontend/build -l 3000 || npx pm2 restart "parking-frontend"
            npx pm2 save
